name: browserless-mcp
version: 1.0.0
description: Model Context Protocol server for Browserless.io browser automation
author: Lizzard Solutions
license: MIT
repository: https://github.com/Lizzard-Solutions/browserless-mcp
keywords:
  - mcp
  - browserless
  - puppeteer
  - playwright
  - browser-automation
  - web-scraping
  - pdf-generation
  - screenshots

# MCP Server Configuration
mcp:
  name: browserless-mcp
  version: 1.0.0
  description: Comprehensive browser automation through Browserless.io
  capabilities:
    tools: {}
  
  # Tool definitions
  tools:
    - name: initialize_browserless
      description: Initialize connection to Browserless instance
      inputSchema:
        type: object
        properties:
          url:
            type: string
            description: Full base URL of the Browserless instance (overrides host/port/protocol)
          host:
            type: string
            default: localhost
            description: Browserless host address
          port:
            type: number
            default: 3000
            description: Browserless port
          token:
            type: string
            description: Authentication token (required)
          protocol:
            type: string
            enum: [http, https, ws, wss]
            default: http
            description: Connection protocol
          timeout:
            type: number
            default: 120000
            description: Request timeout in milliseconds
          concurrent:
            type: number
            default: 5
            description: Maximum concurrent sessions
        required: [token]

    - name: generate_pdf
      description: Generate PDF from URL or HTML content with custom styling
      inputSchema:
        type: object
        properties:
          url:
            type: string
            description: URL to convert to PDF
          html:
            type: string
            description: HTML content to convert to PDF
          options:
            type: object
            properties:
              displayHeaderFooter:
                type: boolean
                description: Display header and footer
              printBackground:
                type: boolean
                description: Print background graphics
              format:
                type: string
                description: Paper format (A4, Letter, etc.)
              landscape:
                type: boolean
                description: Landscape orientation
              margin:
                type: object
                properties:
                  top:
                    type: string
                    description: Top margin (e.g., "20mm")
                  bottom:
                    type: string
                    description: Bottom margin
                  left:
                    type: string
                    description: Left margin
                  right:
                    type: string
                    description: Right margin
        required: [url]

    - name: take_screenshot
      description: Capture screenshots of web pages with various options
      inputSchema:
        type: object
        properties:
          url:
            type: string
            description: URL to screenshot
          options:
            type: object
            properties:
              type:
                type: string
                enum: [png, jpeg, webp]
                description: Image format
              quality:
                type: number
                description: Image quality (1-100)
              fullPage:
                type: boolean
                description: Capture full page
              omitBackground:
                type: boolean
                description: Omit background
              clip:
                type: object
                properties:
                  x:
                    type: number
                    description: X coordinate
                  y:
                    type: number
                    description: Y coordinate
                  width:
                    type: number
                    description: Width
                  height:
                    type: number
                    description: Height
        required: [url]

    - name: get_content
      description: Extract rendered HTML content after JavaScript execution
      inputSchema:
        type: object
        properties:
          url:
            type: string
            description: URL to extract content from
          waitForSelector:
            type: object
            properties:
              selector:
                type: string
                description: CSS selector to wait for
              timeout:
                type: number
                description: Timeout in milliseconds
          waitForFunction:
            type: object
            properties:
              fn:
                type: string
                description: JavaScript function to wait for
              timeout:
                type: number
                description: Timeout in milliseconds
        required: [url]

    - name: execute_function
      description: Execute custom JavaScript code in browser context
      inputSchema:
        type: object
        properties:
          code:
            type: string
            description: JavaScript code to execute (ES module format)
          context:
            type: object
            properties: {}
            description: Additional context data
        required: [code]

    - name: download_files
      description: Handle file downloads and programmatic file creation
      inputSchema:
        type: object
        properties:
          code:
            type: string
            description: JavaScript code to trigger downloads
          context:
            type: object
            properties: {}
            description: Additional context data
        required: [code]

    - name: scrape
      description: Scrape text/html/attributes from a list of CSS selectors on a page
      inputSchema:
        type: object
        properties:
          url:
            type: string
            description: URL to scrape
          html:
            type: string
            description: Raw HTML to scrape instead of a URL
          elements:
            type: array
            items:
              type: object
              properties:
                selector:
                  type: string
                  description: CSS selector to extract
                timeout:
                  type: number
                  description: Timeout in milliseconds
              required: [selector]
          gotoOptions:
            type: object
            properties: {}
            description: Options passed to page.goto (e.g. waitUntil)
        required: [elements]

    - name: run_performance_audit
      description: Run Lighthouse performance audit
      inputSchema:
        type: object
        properties:
          url:
            type: string
            description: URL to audit
          config:
            type: object
            properties:
              extends:
                type: string
                description: Lighthouse config to extend
              settings:
                type: object
                properties: {}
                description: Lighthouse settings
        required: [url]

    - name: create_websocket_connection
      description: Build a WebSocket endpoint for connecting Puppeteer/Playwright to the browser
      inputSchema:
        type: object
        properties:
          browser:
            type: string
            enum: [chromium, firefox, webkit]
            default: chromium
            description: Browser type
          library:
            type: string
            enum: [puppeteer, playwright]
            default: puppeteer
            description: Automation library
          blockAds:
            type: boolean
            description: Block advertisements
          launch:
            type: object
            properties: {}
            description: Launch options forwarded to the browser

    - name: get_health
      description: Get health status of Browserless instance
      inputSchema:
        type: object
        properties: {}

    - name: get_sessions
      description: Get active browser sessions
      inputSchema:
        type: object
        properties: {}

    - name: get_config
      description: Get current configuration
      inputSchema:
        type: object
        properties: {}

    - name: get_metrics
      description: Get performance metrics
      inputSchema:
        type: object
        properties: {}

# Build Configuration
build:
  entrypoint: dist/index.js
  dependencies:
    - "@modelcontextprotocol/sdk"
    - "puppeteer"
    - "playwright"
    - "axios"
    - "ws"
    - "zod"
    - "dotenv"

# Documentation
documentation:
  readme: README.md
  api_reference: ref/browserless_api_reference.md
  examples:
    - name: Basic PDF Generation
      description: Generate PDF from a web page
      code: |
        {
          "name": "generate_pdf",
          "arguments": {
            "url": "https://example.com",
            "options": {
              "format": "A4",
              "printBackground": true
            }
          }
        }
    
    - name: Screenshot Capture
      description: Take a full-page screenshot
      code: |
        {
          "name": "take_screenshot",
          "arguments": {
            "url": "https://example.com",
            "options": {
              "type": "png",
              "fullPage": true
            }
          }
        }
    
    - name: Content Extraction
      description: Extract content with waiting
      code: |
        {
          "name": "get_content",
          "arguments": {
            "url": "https://example.com",
            "waitForSelector": {
              "selector": "#content",
              "timeout": 5000
            }
          }
        }
    
    - name: Custom Function
      description: Execute custom JavaScript
      code: |
        {
          "name": "execute_function",
          "arguments": {
            "code": "export default async function ({ page }) { await page.goto('https://example.com'); const title = await page.title(); return { data: { title }, type: 'application/json' }; }"
          }
        }

# Metadata
metadata:
  category: Browser Automation
  tags:
    - web-scraping
    - pdf-generation
    - screenshots
    - browser-automation
    - puppeteer
    - playwright
    - lighthouse
    - performance
    - websocket
  
  features:
    - PDF generation with custom styling
    - Screenshot capture (PNG, JPEG, WebP)
    - Content extraction with JavaScript execution
    - Custom function execution in browser context
    - Selector-based scraping
    - File download handling
    - Lighthouse performance audits
    - WebSocket connections for Puppeteer/Playwright
    - Health monitoring and metrics
    - Session management
  
  use_cases:
    - Web scraping and data extraction
    - Automated testing and QA
    - PDF report generation
    - Screenshot capture for documentation
    - Performance monitoring
    - Content archiving
    - Form automation
    - E-commerce monitoring
    - Social media automation
    - Compliance reporting

# Publishing
publish:
  npm:
    package_name: "@lizzard-solutions/browserless-mcp"
    access: public
  
  github:
    repository: Lizzard-Solutions/browserless-mcp
    releases: true
  
  docker:
    image_name: lizzard-solutions/browserless-mcp
    platforms:
      - linux/amd64
      - linux/arm64 